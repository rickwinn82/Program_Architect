function normalizedQuoteOutcome(record){
  if(record && record.accepted) return "won";
  const raw = String(record?.outcome || "").toLowerCase();
  return ["won","lost","pending"].includes(raw) ? raw : "pending";
}
function quoteRecordMonthKey(record){
  const basis = normalizedQuoteOutcome(record)==="won" && record?.closeDate ? record.closeDate : (record?.savedAt || "");
  if(!basis) return "unknown";
  const parsed = new Date(basis);
  if(Number.isNaN(parsed.getTime())) return String(basis).slice(0,7) || "unknown";
  return `${parsed.getFullYear()}-${String(parsed.getMonth()+1).padStart(2,"0")}`;
}
function quoteRecordLabelMonth(key){
  if(!key || key==="unknown") return "Unknown";
  const [year, month] = String(key).split("-");
  const parsed = new Date(Number(year), Number(month)-1, 1);
  return Number.isNaN(parsed.getTime()) ? key : parsed.toLocaleDateString(undefined, {month:"short", year:"numeric"});
}
function quoteRecordMatchesFilters(record, filters){
  const search = String(filters?.search || "").trim().toLowerCase();
  const outcome = String(filters?.outcome || "all").toLowerCase();
  const month = String(filters?.month || "all").toLowerCase();
  const followUp = String(filters?.followUp || "all").toLowerCase();
  const recordOutcome = normalizedQuoteOutcome(record);
  const followUpMeta = quoteFollowUpMeta(record);
  const hay = [
    record?.customer,
    record?.phone,
    record?.email,
    record?.notes,
    record?.followUpNote,
    record?.status,
    recordOutcome,
    record?.lostReason
  ].map(v=>String(v||"").toLowerCase()).join(" ");
  if(search && !hay.includes(search)) return false;
  if(outcome !== "all" && recordOutcome !== outcome) return false;
  if(month !== "all" && quoteRecordMonthKey(record) !== month) return false;
  if(followUp !== "all" && followUpMeta.status !== followUp) return false;
  return true;
}
function quoteFollowUpMeta(record){
  const outcome = normalizedQuoteOutcome(record);
  const followUpBy = String(record?.followUpBy || "").trim();
  if(outcome !== "pending"){
    return {followUpBy, diffDays:null, status:"closed", label:"Closed"};
  }
  if(!followUpBy){
    return {followUpBy:"", diffDays:null, status:"missing", label:"Set follow-up"};
  }
  const followUpDate = new Date(`${followUpBy}T00:00:00`);
  if(Number.isNaN(followUpDate.getTime())){
    return {followUpBy:"", diffDays:null, status:"missing", label:"Set follow-up"};
  }
  const today = new Date();
  today.setHours(0,0,0,0);
  const diffDays = Math.ceil((followUpDate.getTime() - today.getTime()) / 86400000);
  if(diffDays < 0) return {followUpBy, diffDays, status:"overdue", label:"Past due"};
  if(diffDays <= 7) return {followUpBy, diffDays, status:"dueSoon", label:"Due this week"};
  return {followUpBy, diffDays, status:"scheduled", label:"Scheduled"};
}
function monthlyOperationsRows(records, manualSales){
  const grouped = new Map();
  const ensure = key=>{
    if(!grouped.has(key)) grouped.set(key, {month:key, won:0, lost:0, pending:0, pipeline:0, manual:0, total:0, count:0});
    return grouped.get(key);
  };
  (records||[]).forEach(record=>{
    const bucket = ensure(quoteRecordMonthKey(record));
    const value = Number(record?.finalSoldValue || record?.total || 0);
    const outcome = normalizedQuoteOutcome(record);
    bucket.count += 1;
    if(outcome==="won"){
      bucket.won += value;
      bucket.total += value;
    } else if(outcome==="lost"){
      bucket.lost += value;
    } else {
      bucket.pending += value;
      bucket.pipeline += value;
    }
  });
  (manualSales||[]).forEach(sale=>{
    const bucket = ensure(quoteRecordMonthKey({savedAt:sale?.savedAt}));
    const value = Number(sale?.value || 0);
    bucket.manual += value;
    bucket.total += value;
  });
  return Array.from(grouped.values()).sort((a,b)=>String(b.month).localeCompare(String(a.month)));
}

function splitCsvRow(line, delimiter=","){
  const out=[];
  let cur="", inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(inQuotes && line[i+1]==='"'){ cur+='"'; i++; }
      else inQuotes=!inQuotes;
    } else if(ch===delimiter && !inQuotes){
      out.push(cur.trim()); cur="";
    } else {
      cur += ch;
    }
  }
  out.push(cur.trim());
  return out;
}

function parseCatalogDelimited(text, fallbackCategory="materials", sourceMeta={}){
  const cleaned = String(text||"").trim();
  if(!cleaned) return [];
  
  if(!lines.length) return [];
  const delimiter = lines[0].includes("	") ? "	" : ",";
  const rawHeaders = splitCsvRow(lines[0], delimiter).map(h => h.trim().toLowerCase());
  const mapHeader = (h) => {
    if(["name","product","item","description","material","equipment"].includes(h)) return "name";
    if(["sku","item #","item#","code","product code","part","part #","part#"].includes(h)) return "sku";
    if(["price","unit price","cost","amount","net price"].includes(h)) return "price";
    if(["notes","note","comments","comment","details"].includes(h)) return "notes";
    if(["size","package","pack","uom","unit"].includes(h)) return "pack_size";
    if(["category","type","class","group"].includes(h)) return "category";
    if(["npk","n-p-k","analysis","fertilizer analysis","grade"].includes(h)) return "npk";
    return h;
  };
  const headers = rawHeaders.map(mapHeader);
  const idx = {
    name:headers.indexOf("name"),
    sku:headers.indexOf("sku"),
    price:headers.indexOf("price"),
    notes:headers.indexOf("notes"),
    pack_size:headers.indexOf("pack_size"),
    category:headers.indexOf("category"),
    npk:headers.indexOf("npk")
  };
  const looksLikeHeader = headers.includes("name") || rawHeaders.some(h => /name|product|item|description|price|sku|code|category/.test(h));
  const parseLine = (parts) => {
    const row = {
      name: idx.name >= 0 ? (parts[idx.name]||"") : (parts[0]||""),
      sku: idx.sku >= 0 ? (parts[idx.sku]||"") : (parts[1]||""),
      price: idx.price >= 0 ? (parts[idx.price]||0) : (parts[2]||0),
      notes: idx.notes >= 0 ? (parts[idx.notes]||"") : (parts[3]||""),
      pack_size: idx.pack_size >= 0 ? (parts[idx.pack_size]||"") : "",
      npk: idx.npk >= 0 ? (parts[idx.npk]||"") : "",
      category: idx.category >= 0 ? (parts[idx.category]||fallbackCategory) : fallbackCategory,
      source_type: sourceMeta.source_type || "csv",
      source_file: sourceMeta.source_file || ""
    };
    return normalizeCatalogRow(row, fallbackCategory);
  };
  return (looksLikeHeader ? lines.slice(1) : lines)
    .map(line => parseLine(splitCsvRow(line, delimiter)))
    .filter(r => r.name);
}

async function ensurePdfJs(){

    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.js';

    document.head.appendChild(script);
  });

  }

async function extractPdfText(file){
  const pdfjsLib = await ensurePdfJs();
  const data = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data}).promise;
  const pages = [];
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const buckets = new Map();
    (content.items||[]).forEach(item=>{
      const y = Math.round((item.transform?.[5]||0) * 2) / 2;
      const arr = buckets.get(y) || [];
      arr.push({x:item.transform?.[4]||0, str:item.str||""});
      buckets.set(y, arr);
    });
    const lines = Array.from(buckets.entries())
      .sort((a,b)=>b[0]-a[0])
      .map(([,items])=>items.sort((a,b)=>a.x-b.x).map(i=>i.str).join(' ').replace(/\s+/g,' ').trim())
      .filter(Boolean);
    pages.push(lines.join('\n'));
  }
  return pages.join('\n');
}
function parsePdfBidText(text, fallbackCategory="materials", sourceMeta={}){
  const lines = String(text||"").split(/\r?\n/).map(line=>line.replace(/\s+/g,' ').trim()).filter(Boolean);
  const rows = [];
  let currentCategory = fallbackCategory;
  const isCategoryLine = (line) => /^(?:\d+\s+)?(Herbicides|FUNGCICIDES|INSECTICIDES|BIO|SOIL|EQUIPMENT)\b/i.test(line);
  const categoryFromLine = (line) => {
    const m = line.match(/(Herbicides|FUNGCICIDES|INSECTICIDES|BIO|SOIL|EQUIPMENT)/i);
    return m ? normalizeCatalogCategory(m[1], fallbackCategory) : fallbackCategory;
  };
  const isNoise = (line) => /^(Bid|Bill To:|Ship To:|Quote#|Created|Printed|Line|#|Item #|Item Desc|Qty UOM|Unit Extended|Price|Job Name|Total Price:|Quoted price is for material only|Local tax may differ|%PDF|\/Parent|\/Resources|\/MediaBox|xref|stream|endstream|obj|endobj)/i.test(line);
  const isRowStart = (line) => /^(\d+\s+)?[A-Z0-9][A-Z0-9.-]{3,}\s+.+/.test(line) && !isNoise(line) && !isCategoryLine(line);
  let i = 0;
  while(i < lines.length){
    const line = lines[i];
    if(isCategoryLine(line)){ currentCategory = categoryFromLine(line); i++; continue; }
    if(isNoise(line)){ i++; continue; }
    if(!isRowStart(line)){ i++; continue; }
    const block = [line];
    let j = i + 1;
    while(j < lines.length && !isRowStart(lines[j]) && !isCategoryLine(lines[j]) && !/^Total Price:/i.test(lines[j])){
      block.push(lines[j]);
      j++;
    }
    const first = block[0].match(/^(?:(\d+)\s+)?([A-Z0-9][A-Z0-9.-]{3,})\s+(.+)$/);
    if(first){
      const [, lineNo, sku, descStart] = first;
      const product = {
        name: descStart,
        sku,
        price: 0,
        notes: lineNo ? `Line ${lineNo}` : "",
        category: currentCategory,
        source_type: 'pdf',
        source_file: sourceMeta.source_file || '',
        source_vendor: sourceMeta.source_vendor || '',
        source_quote_number: sourceMeta.source_quote_number || ''
      };
      let noteMode = false;
      const prices = [];
      for(let k=1;k<block.length;k++){
        const row = block[k];
        if(/^Item Note:/i.test(row)){
          noteMode = true;
          const cleaned = row.replace(/^Item Note:/i,'').trim();
          if(cleaned) product.notes += `${product.notes?'; ':''}${cleaned}`;
          continue;
        }
        const packed = row.match(/^(\d+)\s+(EA|BG|LB|GAL|OZ|QT|CS)\s+([\d,]+\.\d+)\s+([\d,]+\.\d+)$/i);
        if(packed){
          product.pack_size = `${packed[1]} ${packed[2].toUpperCase()}`;
          prices.push(parseMoneyValue(packed[3]), parseMoneyValue(packed[4]));
          noteMode = false;
          continue;
        }
        const packed3 = row.match(/^(\d+)\s+(EA|BG|LB|GAL|OZ|QT|CS)\s+([\d,]+\.\d+)$/i);
        if(packed3){
          product.pack_size = `${packed3[1]} ${packed3[2].toUpperCase()}`;
          prices.push(parseMoneyValue(packed3[3]));
          noteMode = false;
          continue;
        }
        if(/^[\d,]+\.\d+$/.test(row)){
          prices.push(parseMoneyValue(row));
          noteMode = false;
          continue;
        }
        if(/^(EA|BG|LB|GAL|OZ|QT|CS)$/i.test(row)){
          const qtyPart = product.pack_size ? product.pack_size.split(' ')[0] : '1';
          product.pack_size = `${qtyPart} ${row.toUpperCase()}`;
          noteMode = false;
          continue;
        }
        if(/^\d+$/.test(row) && !noteMode){
          const unitPart = product.pack_size ? product.pack_size.split(' ').slice(1).join(' ') : '';
          product.pack_size = `${row} ${unitPart}`.trim();
          continue;
        }
        if(noteMode) product.notes += `${product.notes?'; ':''}${row}`;
        else product.name += ` ${row}`;
      }
      if(prices.length) product.price = prices[prices.length-1];
      const normalized = normalizeCatalogRow(product, currentCategory);
      const badName = /^(0|Herbicides|FUNGCICIDES|INSECTICIDES|BIO|SOIL|EQUIPMENT)$/i.test(normalized.name);
      if(normalized.name && !badName) rows.push(normalized);
    }
    i = j;
  }
  return rows.filter(r=>r.name && !/^(Total Price|Quoted price)/i.test(r.name));
}

    const required = field.requiredWhen ? !!field.requiredWhen(state) : false;

function cockpitFocusBucket(item){
  const tone = String(item?.tone || "").toLowerCase();

  if(tone === "compliance" || tone === "binder") return "compliance";
  if(tone === "pipeline" || tone === "sales") return "sales";
  if(tone === "production" || tone === "programs") return "production";
  return "auto";
}
function applyCockpitFocus(items, focus){
  const selected = String(focus || "auto");
  if(selected === "auto") return items;
  return [...items].sort((a,b)=>{
    const aMatch = cockpitFocusBucket(a) === selected ? 1 : 0;
    const bMatch = cockpitFocusBucket(b) === selected ? 1 : 0;
    return bMatch - aMatch;
  });
}

async function runCentralSarasotaSoilAutofill(state){
  if(isLocalDesktopOpen()){
    state.soilAutoAttemptDay = todayKey();
    state.soilAutoStatus = "Auto-fill is unavailable in local desktop file mode. Enter the soil temperature manually.";
    saveState(state);
    render();
    return;
  }
  if(state.soilAutoFetchedAt && state.soilAutoAttemptDay === todayKey() && state.soilTemp !== ""){
    state.soilAutoStatus = `Using cached reading from today: ${state.soilTemp} F.`;
    saveState(state);
    render();
    return;
  }
  state.soilAutoAttemptDay = todayKey();
  state.soilAutoStatus = "Fetching the nearest public soil reading for central Sarasota...";
  saveState(state);
  render();
  try{
    const reading = await fetchCentralSarasotaSoilTemp((message)=>{
      const latest = loadState();
      latest.soilAutoStatus = message;
      latest.soilAutoAttemptDay = todayKey();
      saveState(latest);
      render();
    });
    const latest = loadState();
    latest.soilTemp = String(reading.tempF);
    latest.lastDailyRefresh = todayKey();
    latest.soilAutoAttemptDay = todayKey();
    latest.soilAutoSource = `${reading.stationName} 4-inch soil temperature via ${reading.method}`;
    latest.soilAutoFetchedAt = new Date().toISOString();
    latest.soilAutoStatus = `Auto-filled from ${reading.stationName} using ${reading.method}.`;
    saveState(latest);
    render();
  }catch(err){
    const latest = loadState();
    latest.soilAutoAttemptDay = todayKey();
    latest.soilAutoStatus = `Auto-fill failed. ${String(err?.message || err || "Use the manual field instead.")}`;
    saveState(latest);
    render();
  }
}
function cockpitFieldConditions(state){
  const soil = Number(state.soilTemp);
  const hasSoil = !(state.soilTemp==="" || Number.isNaN(soil));
  const month = new Date().getMonth() + 1;
  const warmSeason = month >= 5 && month <= 10;
  const rainSignal = warmSeason ? "Higher convective-rain risk" : "Lower routine-rain pressure";
  const turf = turfDisplayName(state.turf);
  let sprayWindow = "Use a normal field window";
  let moistureWatch = warmSeason ? "Watch afternoon wash-off risk and leaf wetness." : "Use dew and shade retention to judge surface moisture.";
  let diseasePressure = warmSeason ? "Warm-season disease pressure can escalate where moisture lingers." : "Cooler-period disease pressure is more selective and site-history driven.";
  if(hasSoil){
    if(soil < 60){
      sprayWindow = "Delay aggressive response chemistry";
      moistureWatch = "Cooler soils mean slower uptake and longer recovery windows.";
      diseasePressure = "Avoid broad disease assumptions until site symptoms and weather fit the call.";
    } else if(soil < 68){
      sprayWindow = "Prefer measured transition-window applications";
      moistureWatch = "Good time to avoid overcommitting ahead of full biological response.";
    } else if(soil < 80){
      sprayWindow = "Prime field execution window";
      moistureWatch = warmSeason ? "Use the earlier part of the day before heat and storms build." : "Use stable morning conditions for cleaner coverage and response.";
    } else if(soil < 85){
      sprayWindow = "Earlier spray window is favored";
      moistureWatch = "Heat load is rising, so protect coverage quality and avoid late-day stress timing.";
      diseasePressure = "Warm, wet surfaces and stress can turn localized disease pressure quickly.";
    } else {
      sprayWindow = "Run an early-only stress-aware field window";
      moistureWatch = "Heat and evapotranspiration are high; prioritize lower-stress timing and cleaner application windows.";
      diseasePressure = "Protective thinking matters more than push-growth thinking under this heat profile.";
    }
  }
  const turfNote = turf === "Bahia"
    ? "Bahia performance should stay practical and stress-aware rather than over-managed."
    : turf.includes("Zoysia")
      ? "Zoysia response rewards restraint and cleaner timing more than force."
      : turf === "Bermuda"
        ? "Bermuda can move quickly when heat is on, so timing discipline matters."
      : "St. Augustine needs timing that respects disease, moisture, and heat interaction.";
  return {rainSignal, sprayWindow, moistureWatch, diseasePressure, turfNote};
}

    const row = state.vendorCatalog?.[category]?.[Number(idx)];
    const removeId = row?.id;
    state.catalogState.products = (state.catalogState.products||[]).filter(p=>p.id !== removeId);
    state.vendorCatalog = rebuildVendorCatalogFromProducts(state.catalogState.products||[]);
    saveState(state); render();
  });
  const smartDefaults=document.getElementById("smartDefaults");
  if(smartDefaults) smartDefaults.onclick=()=>{
    applySmartQuoteDefaults(state);
    saveState(state);
    render();
  };
document.querySelectorAll("[data-revise]").forEach(el=>el.onclick=()=>{ state.currentQuote = JSON.parse(JSON.stringify(state.history[Number(el.dataset.revise)])); state.view="quote"; saveState(state); render(); });
  document.querySelectorAll("[data-resend]").forEach(el=>el.onclick=()=>{ const rec=state.history[Number(el.dataset.resend)]; const tmp={...state, currentQuote:rec}; const txt=buildEstimateText(tmp, quoteTotals(tmp), intel); window.location.href=`mailto:${encodeURIComponent(rec.email||"")}?subject=${encodeURIComponent("Program Architect Estimate - "+(rec.customer||"Customer"))}&body=${encodeURIComponent(txt)}`; });
  document.querySelectorAll("[data-delete-est]").forEach(el=>el.onclick=()=>{ state.history.splice(Number(el.dataset.deleteEst),1); saveState(state); render(); });
  document.querySelectorAll("[data-accept-est]").forEach(el=>el.onchange=()=>{
    const idx = Number(el.dataset.acceptEst);
    const rec = state.history[idx];
    if(!rec) return;
    rec.accepted = !!el.checked;
    rec.outcome = rec.accepted ? "won" : "pending";
    rec.status = rec.accepted ? "Accepted" : "Pending";
    if(rec.accepted && !rec.closeDate) rec.closeDate = localIsoDate();
    saveState(state); render();
  });
  document.querySelectorAll("[data-history-outcome]").forEach(el=>el.onchange=()=>{
    const idx = Number(el.dataset.historyOutcome);
    const rec = state.history[idx];
    if(!rec) return;
    const outcome = String(el.value||"pending");
    rec.outcome = outcome;
    rec.accepted = outcome === "won";
    rec.status = outcome === "won" ? "Accepted" : outcome === "lost" ? "Lost" : "Pending";
    if(outcome === "won" && !rec.closeDate) rec.closeDate = localIsoDate();
    if(outcome !== "won" && rec.closeDate && outcome === "pending") rec.closeDate = "";
    saveState(state); render();
  });
  document.querySelectorAll("[data-close-date]").forEach(el=>el.onchange=()=>{
    const idx = Number(el.dataset.closeDate);
    const rec = state.history[idx];
    if(!rec) return;
    rec.closeDate = el.value || "";
    saveState(state); render();
  });
  document.querySelectorAll("[data-followup-date]").forEach(el=>{
    const commit = ()=>{
      const idx = Number(el.dataset.followupDate);
      const rec = state.history[idx];
      if(!rec) return;
      rec.followUpBy = el.value || "";
      saveState(state);
      render();
    };
    el.onchange = commit;
    el.onblur = commit;
  });
  document.querySelectorAll("[data-followup-note]").forEach(el=>{
    const commit = ()=>{
      const idx = Number(el.dataset.followupNote);
      const rec = state.history[idx];
      if(!rec) return;
      rec.followUpNote = el.value || "";
      saveState(state);
    };
    el.onchange = ()=>{ commit(); render(); };
    el.onblur = commit;
  });
  document.querySelectorAll("[data-contacted-today]").forEach(el=>el.onclick=()=>{
    const idx = Number(el.dataset.contactedToday);
    const rec = state.history[idx];
    if(!rec) return;
    const today = localIsoDate();
    rec.lastContactedAt = today;
    if(normalizedQuoteOutcome(rec)==="pending"){
      if(!rec.followUpBy || quoteFollowUpMeta(rec).status === "overdue"){
        rec.followUpBy = isoDateOffset(7);
      }
      if(!String(rec.followUpNote||"").trim()){
        rec.followUpNote = "Follow up after today's contact";
      }
    }
    saveState(state);
    render();
  });
  document.querySelectorAll("[data-mark-won]").forEach(el=>el.onclick=()=>{
    const idx = Number(el.dataset.markWon);
    const rec = state.history[idx];
    if(!rec) return;
    rec.outcome = "won";
    rec.accepted = true;
    rec.status = "Accepted";
    if(!rec.closeDate) rec.closeDate = localIsoDate();
    if(!Number(rec.finalSoldValue || 0)) rec.finalSoldValue = Number(rec.total || 0);
    saveState(state);
    render();
  });
  document.querySelectorAll("[data-mark-lost]").forEach(el=>el.onclick=()=>{
    const idx = Number(el.dataset.markLost);
    const rec = state.history[idx];
    if(!rec) return;
    rec.outcome = "lost";
    rec.accepted = false;
    rec.status = "Lost";
    if(!rec.closeDate) rec.closeDate = localIsoDate();
    if(!String(rec.lostReason||"").trim()) rec.lostReason = "Add lost reason";
    saveState(state);
    render();
  });
  document.querySelectorAll("[data-lost-reason]").forEach(el=>{
    const commit = ()=>{
      const idx = Number(el.dataset.lostReason);
      const rec = state.history[idx];
      if(!rec) return;
      rec.lostReason = el.value || "";
      saveState(state);
    };
    el.onchange = ()=>{ commit(); render(); };
    el.onblur = commit;
  });
  document.querySelectorAll("[data-final-sold]").forEach(el=>el.onchange=()=>{
    const idx = Number(el.dataset.finalSold);
    const rec = state.history[idx];
    if(!rec) return;
    rec.finalSoldValue = Number(el.value||0);
    saveState(state); render();
  });
}
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  installPrompt = e;
  const btn = document.getElementById("installBtn");
  if(btn) btn.classList.remove("hidden");
});
window.addEventListener("DOMContentLoaded", ()=>{
  const btn = document.getElementById("installBtn");
  if(btn){
    btn.onclick = async ()=>{
      if(!installPrompt) return;
      installPrompt.prompt();
      await installPrompt.userChoice;
      installPrompt = null;
      btn.classList.add("hidden");
    };
  }
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }
  const initialState = loadState();
  migrateEmbeddedDocuments(initialState).finally(()=>render());
});
</script>
  
</body>
</html>
